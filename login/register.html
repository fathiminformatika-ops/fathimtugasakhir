<!DOCTYPE html>
<!-- Source Codes By CodingNepal - www.codingnepalweb.com -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form in HTML and CSS | CodingNepal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login_form">
    <!-- Login form container -->
    <form id="registerForm" action="#">
      <h3>Register</h3>

      <div class="login_option">
        <!-- Google button -->
        <div class="option">
          <a href="#">
            <img src="logos/google.png" alt="Google" />
            <span>Google</span>
          </a>
        </div>

        <!-- Apple button -->
        <div class="option">
          <a href="#">
            <img src="logos/apple.png" alt="Apple" />
            <span>Apple</span>
          </a>
        </div>
      </div>

      <!-- Login option separator -->
      <p class="separator">
        <span>or</span>
      </p>

      <!-- Email input box -->
      <div class="input_box">
        <label for="username">Username</label>
        <input type="username" id="username" placeholder="Masukkan username" required />
      </div>

      <div class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Masukkan email" required />
      </div>

      <!-- Paswwrod input box -->
      <div class="input_box">
        <div class="password_title">
          <label for="password">Password</label>
          <a href="#">Lupa Password?</a>
        </div>

        <input type="password" id="password" placeholder="Masukkan password" required />
      </div>

       <!-- Login button -->
      <button type="submit">Masuk</button>
      
      <p id="message"></p>
      
      <p class="sign_up">Don't have an account? <a href="#">Sign up</a></p>
    </form>
  </div>
    <div id="alertBox" class="alert" style="display:none;"></div>
  
<script src="js/register.js"></script>
</body>
</html>
